<div class="container">
    <div class="header-title text-center text-white py-1 mb-3">
        <h1 class="m-0"><strong>FRAMEWORK TAB 1</strong></h1>
    </div>
    <ul class="nav nav-pills">
        <li
        *ngFor="let tab of tabsArr" class="nav-item">
            <a href="javascript:;"
            [ngClass]="{
                active : selectedSkill.toLowerCase().includes(tab.frameWorkName)
            }" class="nav-link"
            (click)="onTabChange(tab.frameWorkName)">
                {{tab.tabTitle}}
            </a>
        </li>
    </ul>
    <hr>

    <div class="card">
        <ng-container *ngFor="let tab of tabsArr">
            <div 
            class="card-body"
            [innerHTML]="tab.tabContent"
            *ngIf="selectedSkill.toLowerCase().includes(tab.frameWorkName)"></div>
        </ng-container>
    </div>
</div>
